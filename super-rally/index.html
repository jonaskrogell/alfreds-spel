<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Super Rally</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="back-btn" onclick="window.parent.postMessage('goBack', '*')">⬅️ Tillbaka</button>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="lap-counter">Varv: <span id="lap">1</span></div>
    </div>
    
    <div id="joypad">
        <button id="btn-left" class="control-btn">⬅️</button>
        <button id="btn-right" class="control-btn">➡️</button>
    </div>

    <!-- Växelspak -->
    <div id="gear-slider-container">
        <label>VÄXEL</label>
        <div class="gear-label drive">D</div>
        <input type="range" id="gear-slider" min="-1" max="1" step="0.05" value="1">
        <div class="gear-label neutral">- N -</div>
        <div class="gear-label reverse">R</div>
    </div>

    <!-- Celebration element for when passing the goal line -->
    <div id="celebration">BRA KÖRT! 🥳</div>

    <script src="game.js"></script>
</body>
</html>
